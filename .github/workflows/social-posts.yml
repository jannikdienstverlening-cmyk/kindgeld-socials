name: Sociale Media Posts Automatisering

on:
  schedule:
    - cron: "0 19 * * 0"  # Elke zondag om 19:00 UTC
  workflow_dispatch:       # Handmatig triggeren via GitHub UI

jobs:
  generate-and-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Dependencies installeren
        run: npm ci

      - name: Canvas dependencies installeren (Ubuntu)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libcairo2-dev libpango1.0-dev libjpeg-dev \
            libgif-dev librsvg2-dev

      - name: Content + afbeeldingen genereren
        run: node scripts/generate-content.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Posts inplannen via Ayrshare
        run: node scripts/ayrshare-post.js
        env:
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}

      - name: Gegenereerde posts committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ images/generated/
          git diff --staged --quiet || git commit -m "chore: automatisch gegenereerde posts $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
